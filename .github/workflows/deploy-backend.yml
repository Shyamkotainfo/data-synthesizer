name: Deploy Data Synthesizer Backend

on:
  push:
    branches:
      - dev
      - staging
      - prod
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  AWS_REGION: us-east-1
  ECR_REPO: data-synthesizer-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ---------------------------
      # Checkout repository
      # ---------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------
      # Set IMAGE_TAG based on branch
      # ---------------------------
      - name: Set image tag
        run: |
          BRANCH_NAME=${GITHUB_REF##*/}
          echo "IMAGE_TAG=$BRANCH_NAME" >> $GITHUB_ENV
          echo "SERVICE_NAME=data-synthesizer-$BRANCH_NAME" >> $GITHUB_ENV

          if [ "$BRANCH_NAME" == "dev" ]; then
            echo "ENV_NAME=development" >> $GITHUB_ENV
          elif [ "$BRANCH_NAME" == "staging" ]; then
            echo "ENV_NAME=staging" >> $GITHUB_ENV
          elif [ "$BRANCH_NAME" == "prod" ]; then
            echo "ENV_NAME=production" >> $GITHUB_ENV
          else
            echo "ENV_NAME=development" >> $GITHUB_ENV
          fi

          echo "Deploying branch: $BRANCH_NAME"

      # ---------------------------
      # Configure AWS credentials
      # ---------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ---------------------------
      # Get AWS Account ID
      # ---------------------------
      - name: Get AWS account ID
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

      # ---------------------------
      # Login to Amazon ECR
      # ---------------------------
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------------------
      # Ensure ECR Repository Exists
      # ---------------------------
      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPO \
            --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository \
            --repository-name $ECR_REPO \
            --region $AWS_REGION \
            --image-scanning-configuration scanOnPush=true

      # ---------------------------
      # Set up Docker Buildx (AMD64 for App Runner)
      # ---------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------------------
      # Build and Push Docker Image (AMD64)
      # ---------------------------
      - name: Build and push Docker image
        run: |
          IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

          docker buildx build \
            --platform linux/amd64 \
            -t $IMAGE_URI \
            --push \
            ./backend

      # ---------------------------
      # Trigger App Runner Deployment
      # ---------------------------
      - name: Deploy to App Runner
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='$SERVICE_NAME'].ServiceArn | [0]" \
            --output text)

          if [ "$SERVICE_ARN" != "None" ] && [ -n "$SERVICE_ARN" ]; then
            echo "Triggering deployment for $SERVICE_NAME"
            aws apprunner start-deployment --service-arn $SERVICE_ARN
            echo "✅ Deployment started for: $SERVICE_ARN"
          else
            echo "⚠️ App Runner service '$SERVICE_NAME' not found."
            echo "Please create it manually in the AWS Console using the image:"
            echo "  $IMAGE_URI"
            exit 1
          fi

      # ---------------------------
      # Print the App Runner URL
      # ---------------------------
      - name: Print Service URL
        run: |
          SERVICE_URL=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='$SERVICE_NAME'].ServiceUrl | [0]" \
            --output text)
          echo "✅ App Runner Service URL: https://$SERVICE_URL"